# =====================================================================
#  Telegram Video Duplicate Remover  -  configuration
#  Copy this file to  config.ini  and fill in your details.
# =====================================================================

[telegram]
# Get these free from https://my.telegram.org  ->  "API development tools"
api_id   = 000000
api_hash = your_api_hash_here

# Session name (a file "<session>.session" is created after first login).
session  = dedup_session

[groups]
# Which groups to work on.
#   all                 -> every group/channel your account is a member of
#   @mygroup,@another   -> specific groups by @username
#   -1001234567890      -> specific groups by numeric id
# You can mix usernames and ids, separated by commas.
targets = all

[matching]
# How two videos are judged to be "the same file":
#   name_size  -> same file name AND same byte size   (recommended, fast, safe)
#   name       -> same file name only                 (looser)
#   hash       -> download & compare SHA-256 content   (slowest, most exact)
mode = name_size

# When mode = name_size and this is on, videos with an identical size but a
# missing/blank file name are still compared to each other by size alone.
compare_unnamed_by_size = false
