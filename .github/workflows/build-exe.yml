name: Build Windows EXE

on:
  push:
    branches: [main]
    paths:
      - "gui.py"
      - "tgdedup.py"
      - "db.py"
      - ".github/workflows/build-exe.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install telethon pyinstaller

      - name: Build single-file EXE
        run: >
          pyinstaller --onefile --windowed
          --name TelegramDuplicateRemover
          --collect-submodules telethon
          --hidden-import sqlite3
          gui.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TelegramDuplicateRemover-windows
          path: dist/TelegramDuplicateRemover.exe

      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Windows build
          files: dist/TelegramDuplicateRemover.exe
